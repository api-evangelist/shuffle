naftiko: 1.0.0-alpha2
info:
  label: Shuffle API — Triggers
  description: 'Shuffle API — Triggers. 2 operations. Lead operation: Create Webhook. Self-contained Naftiko capability covering
    one Shuffle business surface.'
  tags:
  - Shuffle
  - Triggers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SHUFFLE_API_KEY: SHUFFLE_API_KEY
capability:
  consumes:
  - type: http
    namespace: shuffle-triggers
    baseUri: https://shuffler.io/api/v1
    description: Shuffle API — Triggers business capability. Self-contained, no shared references.
    resources:
    - name: hooks
      path: /hooks
      operations:
      - name: createwebhook
        method: POST
        description: Create Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: hooks-id
      path: /hooks/{id}
      operations:
      - name: deletewebhook
        method: DELETE
        description: Delete Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Webhook ID
          required: true
    authentication:
      type: bearer
      token: '{{env.SHUFFLE_API_KEY}}'
  exposes:
  - type: rest
    namespace: shuffle-triggers-rest
    port: 8080
    description: REST adapter for Shuffle API — Triggers. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/hooks
      name: hooks
      description: REST surface for hooks.
      operations:
      - method: POST
        name: createwebhook
        description: Create Webhook
        call: shuffle-triggers.createwebhook
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/hooks/{id}
      name: hooks-id
      description: REST surface for hooks-id.
      operations:
      - method: DELETE
        name: deletewebhook
        description: Delete Webhook
        call: shuffle-triggers.deletewebhook
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: shuffle-triggers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Shuffle API — Triggers. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-webhook
      description: Create Webhook
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: shuffle-triggers.createwebhook
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-webhook
      description: Delete Webhook
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: shuffle-triggers.deletewebhook
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
