naftiko: 1.0.0-alpha2
info:
  label: Shuffle API — Workflows
  description: 'Shuffle API — Workflows. 12 operations. Lead operation: Get Execution Results. Self-contained Naftiko capability
    covering one Shuffle business surface.'
  tags:
  - Shuffle
  - Workflows
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SHUFFLE_API_KEY: SHUFFLE_API_KEY
capability:
  consumes:
  - type: http
    namespace: shuffle-workflows
    baseUri: https://shuffler.io/api/v1
    description: Shuffle API — Workflows business capability. Self-contained, no shared references.
    resources:
    - name: streams-results
      path: /streams/results
      operations:
      - name: getexecutionresults
        method: POST
        description: Get Execution Results
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: workflows
      path: /workflows
      operations:
      - name: listworkflows
        method: GET
        description: List Workflows
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: truncate
          in: query
          type: boolean
          description: Whether to truncate workflow details in the response
      - name: createworkflow
        method: POST
        description: Create Workflow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: workflows-schedules
      path: /workflows/schedules
      operations:
      - name: listworkflowschedules
        method: GET
        description: List Workflow Schedules
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: workflows-id
      path: /workflows/{id}
      operations:
      - name: getworkflow
        method: GET
        description: Get Workflow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Workflow ID
          required: true
      - name: updateworkflow
        method: PUT
        description: Update Workflow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Workflow ID
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteworkflow
        method: DELETE
        description: Delete Workflow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Workflow ID
          required: true
    - name: workflows-id-execute
      path: /workflows/{id}/execute
      operations:
      - name: executeworkflow
        method: POST
        description: Execute Workflow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Workflow ID
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: workflows-id-executions
      path: /workflows/{id}/executions
      operations:
      - name: getworkflowexecutions
        method: GET
        description: Get Workflow Executions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Workflow ID
          required: true
        - name: top
          in: query
          type: integer
          description: Number of executions to return
        - name: cursor
          in: query
          type: string
          description: Pagination cursor
    - name: workflows-id-executions-exec_id-abort
      path: /workflows/{id}/executions/{exec_id}/abort
      operations:
      - name: abortworkflowexecution
        method: GET
        description: Abort Workflow Execution
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Workflow ID
          required: true
        - name: exec_id
          in: path
          type: string
          description: Execution ID to abort
          required: true
    - name: workflows-id-schedule
      path: /workflows/{id}/schedule
      operations:
      - name: scheduleworkflow
        method: POST
        description: Schedule Workflow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Workflow ID
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: workflows-id-schedule-sched_id
      path: /workflows/{id}/schedule/{sched_id}
      operations:
      - name: deleteworkflowschedule
        method: DELETE
        description: Delete Workflow Schedule
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Workflow ID
          required: true
        - name: sched_id
          in: path
          type: string
          description: Schedule ID to delete
          required: true
    authentication:
      type: bearer
      token: '{{env.SHUFFLE_API_KEY}}'
