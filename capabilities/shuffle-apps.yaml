      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: shuffle-apps.deleteappauthentication
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: list-app-categories
      description: List App Categories
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: shuffle-apps.listappcategories
      outputParameters:
      - type: object
        mapping: $.
    - name: run-app-category-action
      description: Run App Category Action
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: shuffle-apps.runappcategory
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: search-apps
      description: Search Apps
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: shuffle-apps.searchapps
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: upload-app
      description: Upload App
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: shuffle-apps.uploadapp
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-app
